<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAB — Acervo Digital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    #loader-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 2rem;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #ddd;
      border-top-color: #1a73c5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-box {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 1.5rem;
      max-width: 500px;
      text-align: center;
    }
    .error-box h2 { color: #856404; margin-bottom: 1rem; }
    .error-box p { color: #856404; font-size: 0.95rem; line-height: 1.6; }
    .error-box code {
      display: block;
      background: rgba(0,0,0,0.1);
      padding: 0.5rem;
      margin-top: 1rem;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      word-break: break-all;
    }
    #acervo-content {
      width: 100%;
      background: white;
    }
  </style>
</head>
<body>
  <div id="loader-container">
    <div class="spinner"></div>
    <p>Carregando acervo...</p>
  </div>
  
  <div id="acervo-content"></div>

  <script>
    // Mapeamento de IDs para nomes de arquivo
    const acervoMap = {
      'S33': 'MAB_T_004_S33@ACERVO.html',
      'BAFG120': 'MAB_D_002_BAFG120@ACERVO.html',
      'SBAT70': 'MAB_D_003_SBAT70@ACERVO.html',
      'SMA1': 'MAB_D_001_SMA1@ACERVO.html',
      'EMB01': 'MAB_A_001_EMB01@ACERVO.html',
      'SONDAIV': 'MAB_E_001_SONDAIV@ACERVO.html'
    };

    // Obter parâmetro da URL
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || params.get('acervo');

    // Função para carregar o arquivo
    async function loadAcervo() {
      const loaderContainer = document.getElementById('loader-container');
      const acervoContent = document.getElementById('acervo-content');

      if (!id) {
        loaderContainer.innerHTML = `
          <div class="error-box">
            <h2>⚠️ Identificador não fornecido</h2>
            <p>Use um dos IDs disponíveis como parâmetro de URL:</p>
            <code>acervo-loader.html?id=S33
acervo-loader.html?id=BAFG120
acervo-loader.html?id=SBAT70
acervo-loader.html?id=SMA1
acervo-loader.html?id=EMB01
acervo-loader.html?id=SONDAIV</code>
          </div>
        `;
        return;
      }

      const filename = acervoMap[id.toUpperCase()];
      if (!filename) {
        loaderContainer.innerHTML = `
          <div class="error-box">
            <h2>⚠️ Identificador inválido: "${id}"</h2>
            <p>IDs disponíveis:</p>
            <code>${Object.keys(acervoMap).join(', ')}</code>
          </div>
        `;
        return;
      }

      try {
        const url = `https://raw.githubusercontent.com/heglas/DCTA/main/01.MAB/${filename}`;
        
        // Usar fetch para carregar o HTML
        const response = await fetch(url, { mode: 'no-cors' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const html = await response.text();
        loaderContainer.style.display = 'none';
        acervoContent.innerHTML = html;

        // Re-carregar lucide icons se disponível
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }

        // Re-inicializar model-viewer se disponível
        if (typeof ModelViewerElement !== 'undefined') {
          const modelViewers = acervoContent.querySelectorAll('model-viewer');
          modelViewers.forEach(mv => {
            // O modelo-viewer deve se reinicializar automaticamente
          });
        }

      } catch (error) {
        loaderContainer.innerHTML = `
          <div class="error-box">
            <h2>❌ Erro ao carregar acervo</h2>
            <p>Não foi possível carregar o arquivo solicitado.</p>
            <code>ID: ${id}
Arquivo: ${filename}
Erro: ${error.message}</code>
          </div>
        `;
        console.error('Erro ao carregar acervo:', error);
      }
    }

    // Iniciar carregamento quando DOM estiver pronto
    document.addEventListener('DOMContentLoaded', loadAcervo);
  </script>
</body>
</html>
