<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAB — Acervo Digital (iframe)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 0;
    }
    #loader-status {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      font-size: 1rem;
      color: #666;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #ddd;
      border-top-color: #1a73c5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #acervo-iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="loader-status">
    <div class="spinner"></div>
    <span>Carregando...</span>
  </div>
  
  <iframe id="acervo-iframe" class="hidden"></iframe>

  <script>
    // Mapeamento de IDs para nomes de arquivo
    const acervoMap = {
      'S33': 'MAB_T_004_S33@ACERVO.html',
      'BAFG120': 'MAB_D_002_BAFG120@ACERVO.html',
      'SBAT70': 'MAB_D_003_SBAT70@ACERVO.html',
      'SMA1': 'MAB_D_001_SMA1@ACERVO.html',
      'EMB01': 'MAB_A_001_EMB01@ACERVO.html',
      'SONDAIV': 'MAB_E_001_SONDAIV@ACERVO.html'
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || params.get('acervo');
    const loaderStatus = document.getElementById('loader-status');
    const iframe = document.getElementById('acervo-iframe');

    if (!id || !acervoMap[id.toUpperCase()]) {
      loaderStatus.innerHTML = `
        <div style="text-align: center;">
          <h2 style="margin-bottom: 1rem; color: #d9534f;">⚠️ Erro</h2>
          <p>ID inválido ou não fornecido.</p>
          <p style="margin-top: 1rem; font-size: 0.9rem; color: #999;">Use: ?id=S33, ?id=BAFG120, etc.</p>
        </div>
      `;
    } else {
      const filename = acervoMap[id.toUpperCase()];
      const url = `https://raw.githubusercontent.com/heglas/DCTA/main/01.MAB/${filename}`;
      
      iframe.src = url;
      iframe.onload = function() {
        loaderStatus.classList.add('hidden');
        iframe.classList.remove('hidden');
      };
      iframe.onerror = function() {
        loaderStatus.innerHTML = `
          <div style="text-align: center;">
            <h2 style="margin-bottom: 1rem; color: #d9534f;">❌ Erro</h2>
            <p>Não foi possível carregar o acervo.</p>
            <p style="margin-top: 0.5rem; font-size: 0.9rem; color: #999;">${filename}</p>
          </div>
        `;
      };
    }
  </script>
</body>
</html>
