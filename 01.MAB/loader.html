<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Catálogo de Acervo...</title>
</head>
<body>
    <div id="content"></div>
    <div id="loading" style="text-align: center; padding: 40px; color: #e8eaf0; background: #0b0e14; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div>
            <div style="font-size: 18px; margin-bottom: 20px;">Carregando catálogo...</div>
            <div style="font-size: 12px; color: #8b92b0;">Por favor, aguarde</div>
        </div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const loadingDiv = document.getElementById('loading');
        
        const htmlUrl = 'https://raw.githubusercontent.com/heglas/DCTA/main/01.MAB/Catalogo-Acervo.html';
        const jsonUrl = 'https://raw.githubusercontent.com/heglas/DCTA/main/01.MAB/acervoData.json';
        
        async function loadContent() {
            try {
                console.log('Iniciando carregamento...');
                
                // Carrega o HTML
                console.log('Carregando HTML de:', htmlUrl);
                const htmlResponse = await fetch(htmlUrl);
                if (!htmlResponse.ok) throw new Error(`HTML: HTTP ${htmlResponse.status}`);
                let html = await htmlResponse.text();
                console.log('HTML carregado com sucesso');
                
                // Injeta o conteúdo HTML
                contentDiv.innerHTML = html;
                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'block';
                
                // Tenta carregar o JSON de dados
                console.log('Carregando JSON de:', jsonUrl);
                try {
                    const jsonResponse = await fetch(jsonUrl);
                    if (jsonResponse.ok) {
                        const acervoData = await jsonResponse.json();
                        console.log('JSON carregado com sucesso');
                        
                        // Substitui os dados no script
                        setTimeout(() => {
                            try {
                                // Remove o script antigo e cria um novo com os dados do JSON
                                const oldScript = contentDiv.querySelector('script');
                                if (oldScript) {
                                    const newScript = document.createElement('script');
                                    const scriptContent = oldScript.textContent;
                                    // Remove a definição antiga de acervoData
                                    const cleanedContent = scriptContent.replace(/const acervoData = \[[\s\S]*?\];/, '');
                                    newScript.textContent = `const acervoData = ${JSON.stringify(acervoData)};\n${cleanedContent}`;
                                    oldScript.parentNode.replaceChild(newScript, oldScript);
                                    console.log('Dados do JSON injetados com sucesso');
                                }
                            } catch (e) {
                                console.error('Erro ao injetar dados do JSON:', e);
                            }
                        }, 100);
                    } else {
                        console.warn('JSON não encontrado, usando dados do HTML');
                    }
                } catch (jsonError) {
                    console.warn('Erro ao carregar JSON, usando dados do HTML:', jsonError.message);
                }
                
            } catch (error) {
                console.error('Erro ao carregar:', error);
                loadingDiv.innerHTML = `
                    <div style="background: #1a0a0a; border: 1px solid #e53935; color: #e53935; padding: 40px; border-radius: 5px;">
                        <strong>Erro ao carregar o catálogo</strong><br>
                        ${error.message}<br><br>
                        <a href="javascript:location.reload()" style="color: #c8a84b; text-decoration: none; border: 1px solid #c8a84b; padding: 10px 20px; display: inline-block; border-radius: 4px;">Tentar novamente</a>
                    </div>
                `;
            }
        }
        
        // Carrega quando a página termina de carregar
        window.addEventListener('load', loadContent);
    </script>
</body>
</html>
