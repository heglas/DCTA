<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Catálogo de Acervo...</title>
</head>
<body>
    <div id="content"></div>
    <div id="loading" style="text-align: center; padding: 40px; color: #e8eaf0; background: #0b0e14; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div>
            <div style="font-size: 18px; margin-bottom: 20px;">Carregando catálogo...</div>
            <div style="font-size: 12px; color: #8b92b0;">Por favor, aguarde</div>
        </div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const loadingDiv = document.getElementById('loading');
        
        const htmlUrl = 'https://raw.githubusercontent.com/heglas/DCTA/7e43756e67cd91606cffa990fe2535cb0d521b22/01.MAB/Catalogo-Acervo.html';
        const jsonUrl = 'https://raw.githubusercontent.com/heglas/DCTA/7e43756e67cd91606cffa990fe2535cb0d521b22/01.MAB/acervoData.json';
        
        async function loadContent() {
            try {
                // Carrega o HTML
                const htmlResponse = await fetch(htmlUrl);
                if (!htmlResponse.ok) throw new Error(`HTML: HTTP ${htmlResponse.status}`);
                let html = await htmlResponse.text();
                
                // Carrega o JSON de dados
                const jsonResponse = await fetch(jsonUrl);
                if (!jsonResponse.ok) throw new Error(`JSON: HTTP ${jsonResponse.status}`);
                const acervoData = await jsonResponse.json();
                
                // Injeta o conteúdo HTML
                contentDiv.innerHTML = html;
                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'block';
                
                // Aguarda o script do HTML estar pronto e substitui os dados
                setTimeout(() => {
                    try {
                        // Executa o script do HTML injetado para que ele possa usar acervoData
                        const script = contentDiv.querySelector('script');
                        if (script) {
                            // Cria um novo contexto com acervoData disponível
                            const newScript = document.createElement('script');
                            newScript.textContent = `
                                const acervoData = ${JSON.stringify(acervoData)};
                                ${script.textContent.replace(/const acervoData = \[[\s\S]*?\];/, '')}
                            `;
                            script.parentNode.replaceChild(newScript, script);
                        }
                    } catch (e) {
                        console.error('Erro ao atualizar dados:', e);
                    }
                }, 100);
                
            } catch (error) {
                console.error('Erro ao carregar:', error);
                loadingDiv.innerHTML = `
                    <div style="background: #1a0a0a; border: 1px solid #e53935; color: #e53935; padding: 40px; border-radius: 5px;">
                        <strong>Erro ao carregar o catálogo</strong><br>
                        ${error.message}<br><br>
                        <a href="javascript:location.reload()" style="color: #c8a84b; text-decoration: none; border: 1px solid #c8a84b; padding: 10px 20px; display: inline-block; border-radius: 4px;">Tentar novamente</a>
                    </div>
                `;
            }
        }
        
        // Carrega quando a página termina de carregar
        window.addEventListener('load', loadContent);
    </script>
</body>
</html>
